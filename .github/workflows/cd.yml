name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v2
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/bank-nifty-trading:latest
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v1
      with:
        terraform_version: 1.0.0
    
    # Add this step to ensure SSH keys are properly registered before applying Terraform
    - name: Register SSH Keys with DigitalOcean
      id: register_ssh_keys
      run: |
        echo "Registering SSH keys with DigitalOcean..."
        
        # Save SSH key to file
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/do_key
        chmod 600 ~/.ssh/do_key
        
        # Check and fix key format if needed
        if ! grep -q "BEGIN .* PRIVATE KEY" ~/.ssh/do_key || ! grep -q "END .* PRIVATE KEY" ~/.ssh/do_key; then
          echo "SSH key is missing header/footer. Adding RSA format markers..."
          TMP_KEY=$(cat ~/.ssh/do_key)
          echo "-----BEGIN RSA PRIVATE KEY-----" > ~/.ssh/do_key
          echo "$TMP_KEY" >> ~/.ssh/do_key
          echo "-----END RSA PRIVATE KEY-----" >> ~/.ssh/do_key
          chmod 600 ~/.ssh/do_key
        fi
        
        # Extract public key and register with DigitalOcean
        SSH_PUBKEY=$(ssh-keygen -y -f ~/.ssh/do_key || echo "Failed to extract")
        
        if [[ "$SSH_PUBKEY" == "Failed to extract" ]]; then
          echo "Could not extract public key from private key. Generating new key pair..."
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/new_deploy_key -N "" -q
          SSH_PUBKEY=$(cat ~/.ssh/new_deploy_key.pub)
          
          # Save new private key for later use
          echo "NEW_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          cat ~/.ssh/new_deploy_key >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # Use new key for deployment
          cp ~/.ssh/new_deploy_key ~/.ssh/do_key
          chmod 600 ~/.ssh/do_key
        fi
        
        # Register the key with DigitalOcean
        TIMESTAMP=$(date +%s)
        KEY_NAME="github-action-key-$TIMESTAMP"
        
        REGISTER_RESPONSE=$(curl -s -X POST \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.DIGITALOCEAN_TOKEN }}" \
          -d "{\"name\":\"$KEY_NAME\",\"public_key\":\"$SSH_PUBKEY\"}" \
          "https://api.digitalocean.com/v2/account/keys")
        
        KEY_ID=$(echo "$REGISTER_RESPONSE" | grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2)
        KEY_FINGERPRINT=$(echo "$REGISTER_RESPONSE" | grep -o '"fingerprint":"[^"]*"' | head -1 | cut -d'"' -f4)
        
        if [ -n "$KEY_FINGERPRINT" ]; then
          echo "Successfully registered SSH key with fingerprint: $KEY_FINGERPRINT"
          echo "ssh_fingerprint=$KEY_FINGERPRINT" >> $GITHUB_OUTPUT
        else
          echo "Failed to register SSH key. API response:"
          echo "$REGISTER_RESPONSE"
          echo "Will proceed with existing keys in terraform.tfvars"
        fi
      
    - name: Update Terraform SSH Keys
      run: |
        cd infra
        SSH_FINGERPRINT="${{ steps.register_ssh_keys.outputs.ssh_fingerprint }}"
        
        if [ -n "$SSH_FINGERPRINT" ]; then
          echo "Updating terraform.tfvars with new SSH key fingerprint..."
          
          # Read existing fingerprints
          EXISTING_FINGERPRINTS=$(grep -o 'ssh_key_fingerprints = \[\([^]]*\)\]' terraform.tfvars || echo "ssh_key_fingerprints = []")
          
          # Check if fingerprint is already in the list
          if [[ "$EXISTING_FINGERPRINTS" != *"$SSH_FINGERPRINT"* ]]; then
            # Create new fingerprints list with the new one added
            if [[ "$EXISTING_FINGERPRINTS" == *"[]"* ]]; then
              # Empty list
              NEW_FINGERPRINTS="ssh_key_fingerprints = [\"$SSH_FINGERPRINT\"]"
            else
              # Add to existing list
              NEW_FINGERPRINTS=$(echo "$EXISTING_FINGERPRINTS" | sed -e "s/]/, \"$SSH_FINGERPRINT\"]/")
            fi
            
            # Update terraform.tfvars
            sed -i "s/ssh_key_fingerprints = \[\([^]]*\)\]/$NEW_FINGERPRINTS/" terraform.tfvars
            
            echo "Updated SSH fingerprints in terraform.tfvars"
            grep "ssh_key_fingerprints" terraform.tfvars
          else
            echo "SSH fingerprint already in terraform.tfvars, no update needed"
          fi
        else
          echo "No new SSH fingerprint available, using existing keys in terraform.tfvars"
        fi
    
    - name: Terraform Init
      run: |
        cd infra
        terraform init
      env:
        DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
        TF_VAR_digitalocean_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
    
    - name: Terraform Apply and Get IP
      id: terraform_apply
      run: |
        cd infra
        # Run terraform apply and capture all output
        APPLY_OUTPUT=$(terraform apply -auto-approve)
        echo "Full Terraform apply output:"
        echo "$APPLY_OUTPUT"
        
        # Extract the IP directly from the apply output
        DROPLET_IP=$(echo "$APPLY_OUTPUT" | grep -Eo 'droplet_ip = "([0-9]{1,3}\.){3}[0-9]{1,3}"' | grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}')
        
        if [[ -n "$DROPLET_IP" && "$DROPLET_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Successfully extracted IP from apply output: $DROPLET_IP"
          echo "ip=$DROPLET_IP" >> $GITHUB_OUTPUT
        else
          echo "Failed to extract IP from apply output."
          # Let's check the state directly to see what's there
          echo "Listing available resources in state:"
          terraform state list || echo "No state found"
          
          # Try to get the IP directly from the API using the DigitalOcean CLI
          echo "Attempting to use doctl to get the droplet IP..."
          curl -s -X GET \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DIGITALOCEAN_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets?name=bn-trading-server" > droplets.json
          
          # Extract the IP from the API response
          API_IP=$(cat droplets.json | grep -Eo '"ip_address":"([0-9]{1,3}\.){3}[0-9]{1,3}"' | head -1 | grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}')
          
          if [[ -n "$API_IP" && "$API_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Successfully extracted IP from API: $API_IP"
            echo "ip=$API_IP" >> $GITHUB_OUTPUT
          else
            echo "All attempts to get droplet IP failed. API response:"
            cat droplets.json
            exit 1
          fi
        fi
      env:
        DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
        TF_VAR_digitalocean_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
    
    - name: Wait for SSH to become available
      run: |
        # Get the IP address from previous step output
        DROPLET_IP="${{ steps.terraform_apply.outputs.ip }}"
        echo "Waiting for SSH on $DROPLET_IP to become available..."
        
        # Give the droplet some time to initialize (initial delay)
        echo "Initial wait for 60 seconds to allow droplet to boot up..."
        sleep 60
        
        # Try to connect to SSH with retry
        MAX_RETRIES=10
        RETRY_DELAY=30
        RETRY_COUNT=0
        SSH_READY=false
        
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          echo "Attempt $((RETRY_COUNT+1))/$MAX_RETRIES: Checking SSH connection..."
          
          # Use nc (netcat) to check if SSH port is open
          if nc -z -w 5 $DROPLET_IP 22; then
            echo "SSH is now available!"
            SSH_READY=true
            break
          else
            echo "SSH not yet available. Waiting for $RETRY_DELAY seconds before next attempt..."
            sleep $RETRY_DELAY
            RETRY_COUNT=$((RETRY_COUNT+1))
          fi
        done
        
        if [ "$SSH_READY" != "true" ]; then
          echo "Failed to connect to SSH after $MAX_RETRIES attempts."
          echo "Here's some diagnostic information:"
          echo "Checking if droplet is reachable via ping:"
          ping -c 3 $DROPLET_IP || echo "Ping failed"
          echo "Checking if other ports are reachable:"
          nc -z -v -w 5 $DROPLET_IP 80 || echo "Port 80 closed"
          exit 1
        fi
    
    # Add troubleshooting step to diagnose SSH issues
    - name: SSH Connection Diagnostic
      id: ssh_diagnostic
      run: |
        DROPLET_IP="${{ steps.terraform_apply.outputs.ip }}"
        echo "Running SSH diagnostic tests on $DROPLET_IP..."
        
        # We should already have the SSH key from previous steps
        echo "Using SSH key from registration step..."
        
        # Check SSH key format and contents
        echo "Checking SSH key format..."
        HAS_HEADER=$(grep -c "BEGIN .* PRIVATE KEY" ~/.ssh/do_key || echo "0")
        HAS_FOOTER=$(grep -c "END .* PRIVATE KEY" ~/.ssh/do_key || echo "0")
        
        if [ "$HAS_HEADER" -eq "0" ] || [ "$HAS_FOOTER" -eq "0" ]; then
          echo "⚠️ Error: SSH key is still missing header/footer despite earlier fixes."
          echo "This is a critical issue that needs to be addressed manually."
          echo "Please check the SSH_PRIVATE_KEY secret in GitHub."
          exit 1
        fi
        
        # Display key info
        echo "SSH key information:"
        ssh-keygen -l -f ~/.ssh/do_key || echo "Failed to read SSH key - might be in wrong format"
        
        # Extract public key for verification
        echo "Extracting public key for verification..."
        EXTRACTED_PUBKEY=$(ssh-keygen -y -f ~/.ssh/do_key || echo "Failed to extract")
        
        if [[ "$EXTRACTED_PUBKEY" == "Failed to extract" ]]; then
          echo "Error: Still cannot extract public key from private key."
          echo "Using the previously generated key instead."
          echo "This is likely due to an issue with the SSH_PRIVATE_KEY secret format."
          
          if [ -n "${{ env.NEW_PRIVATE_KEY }}" ]; then
            echo "Using previously generated new key..."
            EXTRACTED_PUBKEY=$(ssh-keygen -y -f ~/.ssh/new_deploy_key || echo "Failed to extract again")
          else
            echo "No backup key available. This is a critical error."
            exit 1
          fi
        else
          echo "Successfully extracted public key!"
          
          # Store the public key for other steps
          echo "$EXTRACTED_PUBKEY" > ~/.ssh/do_key.pub
          chmod 644 ~/.ssh/do_key.pub
          
          # Store the public key in environment for other steps
          echo "EXTRACTED_PUBKEY<<EOF" >> $GITHUB_ENV
          echo "$EXTRACTED_PUBKEY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
        fi
        
        # Test SSH connection with various options for maximum compatibility
        echo "Attempting SSH connection with multiple options..."
        
        # Try with standard options
        if ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/do_key root@$DROPLET_IP 'echo "SSH Connection Test - Standard"'; then
          echo "✅ SSH connection successful with standard options!"
          exit 0
        fi
        
        # Try with insecure cipher options
        echo "Trying with insecure cipher options..."
        if ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o PubkeyAuthentication=yes -o PreferredAuthentications=publickey -o "HostKeyAlgorithms=+ssh-rsa" -o "PubkeyAcceptedAlgorithms=+ssh-rsa" -i ~/.ssh/do_key root@$DROPLET_IP 'echo "SSH Connection Test - Insecure"'; then
          echo "✅ SSH connection successful with insecure cipher options!"
          
          # Save these options for future use
          echo "SSH_USE_INSECURE=true" >> $GITHUB_ENV
          exit 0
        fi
        
        # If still failing, this is a critical issue
        echo "❌ All SSH connection attempts failed."
        echo "Please verify that the SSH key is correctly registered with DigitalOcean."
        echo "You may need to run the fix_ssh_auth.sh script manually or recreate the droplet."
        
        
    # Add the SSH key directly to the droplet
    - name: Add SSH Key to Droplet
      run: |
        DROPLET_IP="${{ steps.terraform_apply.outputs.ip }}"
        echo "Adding SSH key directly to droplet at $DROPLET_IP..."
        
        # Check if we have a valid public key extracted
        if [[ -z "${{ env.EXTRACTED_PUBKEY }}" || "${{ env.EXTRACTED_PUBKEY }}" == *"Failed to extract"* ]]; then
          echo "Error: No valid public key available from the private key."
          echo "Attempting to generate a new key pair for deployment..."
          
          # Generate a new key pair for deployment
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/new_deploy_key -N "" -q
          chmod 600 ~/.ssh/new_deploy_key
          NEW_PUBKEY=$(cat ~/.ssh/new_deploy_key.pub)
          
          # Save the new private key for later use
          echo "NEW_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          cat ~/.ssh/new_deploy_key >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          echo "Using newly generated public key for deployment."
          USE_KEY="~/.ssh/new_deploy_key.pub"
          PUBKEY="$NEW_PUBKEY"
        else
          echo "Using extracted public key from GitHub secret."
          echo "${{ env.EXTRACTED_PUBKEY }}" > ~/.ssh/do_key.pub
          chmod 644 ~/.ssh/do_key.pub
          USE_KEY="~/.ssh/do_key.pub"
          PUBKEY="${{ env.EXTRACTED_PUBKEY }}"
        fi
        
        # Get the droplet ID from the API
        echo "Getting droplet ID for $DROPLET_IP..."
        DROPLET_ID=$(curl -s -X GET \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.DIGITALOCEAN_TOKEN }}" \
          "https://api.digitalocean.com/v2/droplets?per_page=200" | \
          grep -o '"id":[0-9]*,"name":"[^"]*","memory":[0-9]*,"vcpus":[0-9]*,"disk":[0-9]*,"locked":\w*,"status":"active","kernel":null,"created_at":"[^"]*","features":\[[^]]*\],"backup_ids":\[\],"next_backup_window":null,"snapshot_ids":\[\],"image":{[^}]*},"volume_ids":\[\],"size":{[^}]*},"size_slug":"[^"]*","networks":{"v4":\[{"ip_address":"'"$DROPLET_IP"'"' | \
          grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2)
        
        if [ -z "$DROPLET_ID" ]; then
          echo "Failed to get droplet ID. Trying alternative method..."
          DROPLET_ID=$(curl -s -X GET \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DIGITALOCEAN_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets?name=bn-trading-server" | grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2)
            
          if [ -z "$DROPLET_ID" ]; then
            echo "Error: Could not find droplet ID. API response:"
            curl -s -X GET \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.DIGITALOCEAN_TOKEN }}" \
              "https://api.digitalocean.com/v2/droplets?name=bn-trading-server"
            exit 1
          fi
        fi
        
        echo "Found droplet ID: $DROPLET_ID"
        
        # Use console API to add the key directly
        echo "Adding key via console API..."
        CONSOLE_COMMAND="mkdir -p ~/.ssh && chmod 700 ~/.ssh && echo '$PUBKEY' >> ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys && cat ~/.ssh/authorized_keys && echo 'Key added successfully' && systemctl restart sshd"
        
        CONSOLE_RESPONSE=$(curl -s -X POST \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.DIGITALOCEAN_TOKEN }}" \
          -d "{\"type\":\"console\", \"command\":\"$CONSOLE_COMMAND\"}" \
          "https://api.digitalocean.com/v2/droplets/$DROPLET_ID/actions")
        
        echo "Console API response: $CONSOLE_RESPONSE"
        
        # Extract action ID and check status
        ACTION_ID=$(echo "$CONSOLE_RESPONSE" | grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2)
        if [ -n "$ACTION_ID" ]; then
          echo "Console action initiated with ID: $ACTION_ID. Waiting for completion..."
          
          # Optional: Poll for action completion
          sleep 10
          ACTION_STATUS=$(curl -s -X GET \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DIGITALOCEAN_TOKEN }}" \
            "https://api.digitalocean.com/v2/actions/$ACTION_ID" | grep -o '"status":"[^"]*"' | cut -d':' -f2 | tr -d '"')
          
          echo "Action status: $ACTION_STATUS"
        else
          echo "Failed to initiate console action"
        fi
        
        # Wait for the key to be active
        echo "Waiting 20 seconds for the key to be active..."
        sleep 20
        
        # Test the SSH connection
        echo "Testing SSH connection with the key..."
        if [ -n "$NEW_PUBKEY" ]; then
          # We generated a new key, use that for testing
          if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/new_deploy_key root@$DROPLET_IP 'echo "SSH connection successful!"'; then
            echo "✅ SSH connection established successfully with new key!"
            # Use the new key for deployment
            echo "Using new key for deployment"
            echo "${{ env.NEW_PRIVATE_KEY }}" > ~/.ssh/do_key
            chmod 600 ~/.ssh/do_key
          else
            echo "❌ SSH connection test failed with new key. Trying again with original key..."
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/do_key root@$DROPLET_IP 'echo "SSH connection successful!"' || echo "Both keys failed. Further debugging required."
          fi
        else
          # Test with original key
          if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/do_key root@$DROPLET_IP 'echo "SSH connection successful!"'; then
            echo "✅ SSH connection established successfully!"
          else
            echo "❌ SSH connection test failed. Further debugging may be required."
          fi
        fi
    
    - name: Deploy to Droplet
      uses: appleboy/ssh-action@master
      with:
        host: ${{ steps.terraform_apply.outputs.ip }}
        username: root
        # Use NEW_PRIVATE_KEY if it exists, otherwise fall back to SSH_PRIVATE_KEY
        key: ${{ env.NEW_PRIVATE_KEY != '' && env.NEW_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}
        port: 22
        timeout: 120s
        command_timeout: 20m
        use_insecure_cipher: ${{ env.SSH_USE_INSECURE == 'true' }}  # Dynamically set based on successful connection method
        debug: true   # Enable debug mode to see detailed logs
        script: |
          echo "Connected to droplet - Setting up application..."
          
          # Check if docker is installed and running
          if ! command -v docker &> /dev/null; then
            echo "Docker not found. Installing Docker..."
            apt-get update
            apt-get install -y apt-transport-https ca-certificates curl software-properties-common
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | apt-key add -
            add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
            apt-get update
            apt-get install -y docker-ce docker-compose
          fi
          
          # Verify Docker is running
          systemctl start docker
          systemctl enable docker
          docker --version
          
          # Pull the latest image
          echo "Pulling latest Docker image..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bank-nifty-trading:latest
          
          # Create a directory for the application if it doesn't exist
          mkdir -p /opt/bank-nifty-trading
          cd /opt/bank-nifty-trading
          
          # Create a simple docker-compose file if it doesn't exist
          if [ ! -f docker-compose.yml ]; then
            echo "Creating docker-compose.yml file..."
            cat > docker-compose.yml << 'EOF'
            version: '3'
            services:
              app:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/bank-nifty-trading:latest
                ports:
                  - "5000:5000"
                restart: always
              db:
                image: postgres:13
                environment:
                  POSTGRES_PASSWORD: postgres
                  POSTGRES_USER: postgres
                  POSTGRES_DB: trading
                volumes:
                  - pgdata:/var/lib/postgresql/data
                restart: always
            volumes:
              pgdata:
            EOF
          fi
          
          # Start the application
          echo "Starting the application..."
          docker-compose down || true
          docker-compose up -d
          
          # Verify the containers are running
          echo "Verifying deployment..."
          docker ps

    - name: Verify Deployment
      run: |
        DROPLET_IP="${{ steps.terraform_apply.outputs.ip }}"
        echo "Verifying deployment on $DROPLET_IP..."
        
        # Wait for services to start
        echo "Waiting 30 seconds for services to start..."
        sleep 30
        
        # Check if application is responding
        echo "Checking if application is responding..."
        RETRY_COUNT=0
        MAX_RETRIES=5
        
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          echo "Attempt $((RETRY_COUNT+1))/$MAX_RETRIES: Checking application status..."
          
          if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/do_key root@$DROPLET_IP 'docker ps | grep -q bank-nifty-trading'; then
            echo "✅ Application is running successfully!"
            
            # Save deployment info for reference
            echo "DEPLOY_SUCCESS=true" >> $GITHUB_ENV
            echo "DEPLOY_IP=$DROPLET_IP" >> $GITHUB_ENV
            echo "DEPLOY_TIME=$(date)" >> $GITHUB_ENV
            
            exit 0
          else
            echo "Application not fully running yet. Waiting..."
            sleep 20
            RETRY_COUNT=$((RETRY_COUNT+1))
          fi
        done
        
        echo "❌ Deployment verification failed. Check logs for details."
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/do_key root@$DROPLET_IP 'docker ps; docker logs $(docker ps -q --filter "name=bank-nifty")'
        echo "DEPLOY_SUCCESS=false" >> $GITHUB_ENV
