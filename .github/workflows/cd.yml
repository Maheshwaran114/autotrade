name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v2
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/bank-nifty-trading:latest
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v1
      with:
        terraform_version: 1.0.0
    
    - name: Terraform Init
      run: |
        cd infra
        terraform init
      env:
        DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
        TF_VAR_digitalocean_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
    
    - name: Terraform Apply and Get IP
      id: terraform_apply
      run: |
        cd infra
        # Run terraform apply and capture all output
        APPLY_OUTPUT=$(terraform apply -auto-approve)
        echo "Full Terraform apply output:"
        echo "$APPLY_OUTPUT"
        
        # Extract the IP directly from the apply output
        DROPLET_IP=$(echo "$APPLY_OUTPUT" | grep -Eo 'droplet_ip = "([0-9]{1,3}\.){3}[0-9]{1,3}"' | grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}')
        
        if [[ -n "$DROPLET_IP" && "$DROPLET_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Successfully extracted IP from apply output: $DROPLET_IP"
          echo "ip=$DROPLET_IP" >> $GITHUB_OUTPUT
        else
          echo "Failed to extract IP from apply output."
          # Let's check the state directly to see what's there
          echo "Listing available resources in state:"
          terraform state list || echo "No state found"
          
          # Try to get the IP directly from the API using the DigitalOcean CLI
          echo "Attempting to use doctl to get the droplet IP..."
          curl -s -X GET \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DIGITALOCEAN_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets?name=bn-trading-server" > droplets.json
          
          # Extract the IP from the API response
          API_IP=$(cat droplets.json | grep -Eo '"ip_address":"([0-9]{1,3}\.){3}[0-9]{1,3}"' | head -1 | grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}')
          
          if [[ -n "$API_IP" && "$API_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Successfully extracted IP from API: $API_IP"
            echo "ip=$API_IP" >> $GITHUB_OUTPUT
          else
            echo "All attempts to get droplet IP failed. API response:"
            cat droplets.json
            exit 1
          fi
        fi
      env:
        DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
        TF_VAR_digitalocean_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
    
    - name: Wait for SSH to become available
      run: |
        # Get the IP address from previous step output
        DROPLET_IP="${{ steps.terraform_apply.outputs.ip }}"
        echo "Waiting for SSH on $DROPLET_IP to become available..."
        
        # Give the droplet some time to initialize (initial delay)
        echo "Initial wait for 60 seconds to allow droplet to boot up..."
        sleep 60
        
        # Try to connect to SSH with retry
        MAX_RETRIES=10
        RETRY_DELAY=30
        RETRY_COUNT=0
        SSH_READY=false
        
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          echo "Attempt $((RETRY_COUNT+1))/$MAX_RETRIES: Checking SSH connection..."
          
          # Use nc (netcat) to check if SSH port is open
          if nc -z -w 5 $DROPLET_IP 22; then
            echo "SSH is now available!"
            SSH_READY=true
            break
          else
            echo "SSH not yet available. Waiting for $RETRY_DELAY seconds before next attempt..."
            sleep $RETRY_DELAY
            RETRY_COUNT=$((RETRY_COUNT+1))
          fi
        done
        
        if [ "$SSH_READY" != "true" ]; then
          echo "Failed to connect to SSH after $MAX_RETRIES attempts."
          echo "Here's some diagnostic information:"
          echo "Checking if droplet is reachable via ping:"
          ping -c 3 $DROPLET_IP || echo "Ping failed"
          echo "Checking if other ports are reachable:"
          nc -z -v -w 5 $DROPLET_IP 80 || echo "Port 80 closed"
          exit 1
        fi
    
    # Add troubleshooting step to diagnose SSH issues
    - name: SSH Connection Diagnostic
      if: success()
      run: |
        DROPLET_IP="${{ steps.terraform_apply.outputs.ip }}"
        echo "Running SSH diagnostic tests on $DROPLET_IP..."
        
        # Save private key to file for testing
        echo "Writing SSH key to temporary file for testing..."
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/do_key
        chmod 600 ~/.ssh/do_key
        
        # Check SSH key format
        echo "Checking SSH key format..."
        ssh-keygen -l -f ~/.ssh/do_key || echo "Failed to read SSH key - might be in wrong format"
        
        # Try extracting public key from private key
        echo "Attempting to extract public key from private key..."
        EXTRACTED_PUBKEY=$(ssh-keygen -y -f ~/.ssh/do_key || echo "Failed to extract public key - key might be invalid")
        echo "$EXTRACTED_PUBKEY"
        
        # Calculate fingerprint from extracted public key for comparison
        echo "Fingerprint from extracted public key:"
        echo "$EXTRACTED_PUBKEY" > ~/.ssh/do_key.pub
        ssh-keygen -l -f ~/.ssh/do_key.pub || echo "Failed to calculate fingerprint"
        
        # Try SSH connection with debug1 and more options
        echo "Attempting verbose SSH connection with alternative options..."
        ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o PubkeyAuthentication=yes -o PreferredAuthentications=publickey -i ~/.ssh/do_key root@$DROPLET_IP 'echo SSH Connection Test' || echo "Direct SSH test failed"
        
        # Generate public key file for adding to droplet
        if [ -n "$EXTRACTED_PUBKEY" ]; then
          echo "$EXTRACTED_PUBKEY" > ~/.ssh/do_key.pub
          echo "Successfully created public key file from private key"
        fi
        
    # Add the SSH key directly to the droplet
    - name: Add SSH Key to Droplet
      run: |
        DROPLET_IP="${{ steps.terraform_apply.outputs.ip }}"
        echo "Adding SSH key directly to droplet at $DROPLET_IP..."
        # Make the script executable
        chmod +x ./scripts/add_ssh_key_to_droplet.sh
        # Run the script with the extracted public key
        if ! ./scripts/add_ssh_key_to_droplet.sh "${{ secrets.DIGITALOCEAN_TOKEN }}" "$DROPLET_IP" ~/.ssh/do_key.pub; then
          echo "Failed to add SSH key to droplet. Attempting alternative method..."
          # Get the droplet ID from the API
          DROPLET_ID=$(curl -s -X GET \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DIGITALOCEAN_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets?name=bn-trading-server" | grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2)
          # Try a direct SSH command using the DigitalOcean console-access API
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DIGITALOCEAN_TOKEN }}" \
            -d "{\"type\":\"console\", \"command\":\"echo '$EXTRACTED_PUBKEY' >> ~/.ssh/authorized_keys\"}" \
            "https://api.digitalocean.com/v2/droplets/$DROPLET_ID/actions"
        fi
        # Wait for the key to be active
        echo "Waiting 15 seconds for the key to be active..."
        sleep 15
    
    - name: Deploy to Droplet
      uses: appleboy/ssh-action@master
      with:
        host: ${{ steps.terraform_apply.outputs.ip }}
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        timeout: 120s
        command_timeout: 20m
        use_insecure_cipher: true  # Try this if regular connection fails
        debug: true   # Enable debug mode to see detailed logs
        script: |
          echo "Connected to droplet - Setting up application..."
          
          # Check if docker is installed and running
          if ! command -v docker &> /dev/null; then
            echo "Docker not found. Installing Docker..."
            apt-get update
            apt-get install -y apt-transport-https ca-certificates curl software-properties-common
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | apt-key add -
            add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
            apt-get update
            apt-get install -y docker-ce docker-compose
          fi
          
          # Verify Docker is running
          systemctl start docker
          systemctl enable docker
          docker --version
          
          # Pull the latest image
          echo "Pulling latest Docker image..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bank-nifty-trading:latest
          
          # Create a directory for the application if it doesn't exist
          mkdir -p /opt/bank-nifty-trading
          cd /opt/bank-nifty-trading
          
          # Create a simple docker-compose file if it doesn't exist
          if [ ! -f docker-compose.yml ]; then
            echo "Creating docker-compose.yml file..."
            cat > docker-compose.yml << 'EOF'
            version: '3'
            services:
              app:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/bank-nifty-trading:latest
                ports:
                  - "5000:5000"
                restart: always
              db:
                image: postgres:13
                environment:
                  POSTGRES_PASSWORD: postgres
                  POSTGRES_USER: postgres
                  POSTGRES_DB: trading
                volumes:
                  - pgdata:/var/lib/postgresql/data
                restart: always
            volumes:
              pgdata:
            EOF
          fi
          
          # Start the application
          echo "Starting the application..."
          docker-compose down || true
          docker-compose up -d
          
          # Verify the containers are running
          echo "Verifying deployment..."
          docker ps
