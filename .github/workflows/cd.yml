name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v2
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/bank-nifty-trading:latest
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v1
      with:
        terraform_version: 1.0.0
    
    - name: Terraform Init
      run: |
        cd infra
        terraform init
      env:
        DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
        TF_VAR_digitalocean_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
    
    - name: Terraform Apply and Get IP
      id: terraform_apply
      run: |
        cd infra
        # Run terraform apply and capture all output
        APPLY_OUTPUT=$(terraform apply -auto-approve)
        echo "Full Terraform apply output:"
        echo "$APPLY_OUTPUT"
        
        # Extract the IP directly from the apply output
        DROPLET_IP=$(echo "$APPLY_OUTPUT" | grep -Eo 'droplet_ip = "([0-9]{1,3}\.){3}[0-9]{1,3}"' | grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}')
        
        if [[ -n "$DROPLET_IP" && "$DROPLET_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Successfully extracted IP from apply output: $DROPLET_IP"
          echo "ip=$DROPLET_IP" >> $GITHUB_OUTPUT
        else
          echo "Failed to extract IP from apply output."
          # Let's check the state directly to see what's there
          echo "Listing available resources in state:"
          terraform state list || echo "No state found"
          
          # Try to get the IP directly from the API using the DigitalOcean CLI
          echo "Attempting to use doctl to get the droplet IP..."
          curl -s -X GET \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DIGITALOCEAN_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets?name=bn-trading-server" > droplets.json
          
          # Extract the IP from the API response
          API_IP=$(cat droplets.json | grep -Eo '"ip_address":"([0-9]{1,3}\.){3}[0-9]{1,3}"' | head -1 | grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}')
          
          if [[ -n "$API_IP" && "$API_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Successfully extracted IP from API: $API_IP"
            echo "ip=$API_IP" >> $GITHUB_OUTPUT
          else
            echo "All attempts to get droplet IP failed. API response:"
            cat droplets.json
            exit 1
          fi
        fi
      env:
        DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
        TF_VAR_digitalocean_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
    
    - name: Deploy to Droplet
      uses: appleboy/ssh-action@master
      with:
        host: ${{ steps.terraform_apply.outputs.ip }}
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bank-nifty-trading:latest
          docker-compose down
          docker-compose up -d
