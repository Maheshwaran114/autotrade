name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v2
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/bank-nifty-trading:latest
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v1
      with:
        terraform_version: 1.0.0
    
    - name: Terraform Init
      run: |
        cd infra
        terraform init
      env:
        DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
        TF_VAR_digitalocean_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
    
    - name: Terraform Apply
      run: |
        cd infra
        terraform apply -auto-approve
      env:
        DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
        TF_VAR_digitalocean_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
    
    - name: Get Droplet IP
      id: droplet-ip
      run: |
        cd infra
        # Create a temporary output.tf file to ensure we get clean output
        cat > output_ip.tf << EOF
        output "clean_ip" {
          value = digitalocean_droplet.bn_trading.ipv4_address
          description = "The IPv4 address of the droplet"
        }
        EOF
        
        # Make sure everything is initialized with the new output
        terraform init
        
        # First try the most direct method - terraform state show
        echo "Trying terraform state show method..."
        DROPLET_IP=$(terraform state show digitalocean_droplet.bn_trading | grep -A2 'ipv4_address' | grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}')
        
        # Verify we have a valid IP
        if [[ -n "$DROPLET_IP" && "$DROPLET_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Successfully extracted IP with terraform state show: $DROPLET_IP"
        else
          # Fallback to our custom output variable which should be cleaner
          echo "State show method failed, trying custom output method..."
          DROPLET_IP=$(terraform output -raw clean_ip)
          
          # If that still fails, try the multiple extraction methods
          if [[ ! "$DROPLET_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Custom output method failed too. Raw output was:"
            echo "$DROPLET_IP"
            echo "Falling back to regex extraction methods..."
            
            # Save terraform output to a file
            terraform output -raw droplet_ip > /tmp/ip.txt
            
            # Try multiple extraction methods
            IP_GREP=$(grep -Eo '([0-9]{1,3}\.){3}[0-9]{1,3}' /tmp/ip.txt || echo "")
            IP_AWK=$(awk -F'::' '{print $1}' /tmp/ip.txt || echo "")
            
            if [[ -n "$IP_AWK" && "$IP_AWK" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              DROPLET_IP="$IP_AWK"
              echo "Using awk-extracted IP: $DROPLET_IP"
            elif [[ -n "$IP_GREP" && "$IP_GREP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              DROPLET_IP="$IP_GREP"
              echo "Using grep-extracted IP: $DROPLET_IP"
            else
              echo "Error: All extraction methods failed. Cannot proceed without valid IP."
              echo "Contents of /tmp/ip.txt:"
              cat /tmp/ip.txt
              exit 1
            fi
          fi
        fi
        
        # Write to GitHub output
        echo "ip=$DROPLET_IP" >> $GITHUB_OUTPUT
        echo "Final extracted droplet IP: $DROPLET_IP"
    
    - name: Deploy to Droplet
      uses: appleboy/ssh-action@master
      with:
        host: ${{ steps.droplet-ip.outputs.ip }}
        username: root
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bank-nifty-trading:latest
          docker-compose down
          docker-compose up -d
